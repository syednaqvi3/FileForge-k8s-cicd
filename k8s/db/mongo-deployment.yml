apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: mongo

  template:
    metadata:
      labels:
        app: mongo

    spec:
      containers:
        - name: mongo
          image: mongo:7.0

          ports:
            - containerPort: 27017

          envFrom:
            - secretRef:
                name: app-secrets

          volumeMounts:
            - name: mongo-storage
              mountPath: /data/db

            - name: mongo-init-script
              mountPath: /docker-entrypoint-initdb.d

      volumes:
        - name: mongo-storage
          persistentVolumeClaim:
            claimName: ebs-pvc

        - name: mongo-init-script
          configMap:
            name: mongo-init
